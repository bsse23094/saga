    <path d="M-115 -76 C-73 -143 72 -144 115 -78 C146 -28 142 44 96 89 C58 127 -58 128 -96 90 C-142 45 -146 -28 -115 -76 Z" fill="none" stroke="url(#ink)" stroke-width="8"/>

    <path d="M-170 -12 C-94 -36 -24 -39 44 -20 C89 -8 132 -8 172 -20" fill="none" stroke="#8b2a2a" stroke-width="6" stroke-linecap="round" opacity="0.75"/>
    <path d="M-145 24 C-68 1 4 -2 72 16 C102 23 130 22 155 13" fill="none" stroke="#5a6a7a" stroke-width="5" stroke-linecap="round" opacity="0.78"/>

    <text x="0" y="-188" text-anchor="middle" font-family="Cinzel, serif" font-size="28" letter-spacing="8" fill="#5a6a7a">MUSASHI ARC</text>
    <text x="0" y="195" text-anchor="middle" font-family="'IM Fell English', serif" font-size="24" fill="#6f624f">Mastery through discipline</text>
  </g>
</svg>
