<svg width="960" height="540" viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Musashi-inspired visual">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f0e6"/>
      <stop offset="100%" stop-color="#e4dbc9"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5a6a7a"/>
      <stop offset="100%" stop-color="#4a3f30"/>
    </linearGradient>
    <filter id="grain2" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.05"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg2)"/>
  <rect width="960" height="540" filter="url(#grain2)"/>

  <g transform="translate(480 270)">
