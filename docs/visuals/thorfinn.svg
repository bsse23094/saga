<svg width="960" height="540" viewBox="0 0 960 540" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Thorfinn-inspired visual">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f5f0e6"/>
      <stop offset="100%" stop-color="#e8dfcf"/>
    </linearGradient>
    <linearGradient id="blade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#8b2a2a"/>
      <stop offset="100%" stop-color="#a63d2f"/>
    </linearGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.06"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="960" height="540" fill="url(#bg)"/>
  <rect width="960" height="540" filter="url(#grain)"/>

  <g transform="translate(480 270)">
    <circle r="150" fill="none" stroke="#d4cbb8" stroke-width="2"/>
    <path d="M-220 0 H220" stroke="#d4cbb8" stroke-width="1" stroke-dasharray="6 7"/>

    <path d="M-70 -130 C-100 -118 -115 -86 -109 -52 C-101 -8 -73 15 -45 40 C-12 69 6 95 6 130" fill="none" stroke="#4a3f30" stroke-width="8" stroke-linecap="round"/>
    <path d="M20 -95 C-7 -80 -18 -47 -11 -19 C-1 19 26 41 55 66 C79 87 95 107 98 130" fill="none" stroke="#4a3f30" stroke-width="6" stroke-linecap="round"/>

    <path d="M-20 -6 L160 -6 C186 -6 208 16 208 42 C208 68 186 90 160 90 L-20 90 Z" fill="url(#blade)" opacity="0.16"/>
    <rect x="-28" y="30" width="240" height="20" rx="10" fill="url(#blade)" opacity="0.8"/>

    <text x="0" y="-175" text-anchor="middle" font-family="Cinzel, serif" font-size="28" letter-spacing="8" fill="#8b2a2a">THORFINN ARC</text>
    <text x="0" y="190" text-anchor="middle" font-family="'IM Fell English', serif" font-size="24" fill="#6f624f">From rage to responsibility</text>
  </g>
</svg>
